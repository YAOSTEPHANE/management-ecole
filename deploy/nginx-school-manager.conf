# Remplacer VOTRE_DOMAINE par votre nom de domaine (ex. ecole.example.com).
# Copier vers : /etc/nginx/sites-available/school-manager
# Puis : sudo ln -sf /etc/nginx/sites-available/school-manager /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx

upstream school_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream school_api {
    server 127.0.0.1:5000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name VOTRE_DOMAINE;

    # Certbot (Let's Encrypt) — décommenter après la première obtention du certificat
    # return 301 https://$host$request_uri;

    client_max_body_size 25M;

    location /api/ {
        proxy_pass http://school_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /uploads/ {
        proxy_pass http://school_api/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://school_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# Bloc HTTPS — Certbot peut l'ajouter automatiquement avec :
#   sudo certbot --nginx -d VOTRE_DOMAINE
